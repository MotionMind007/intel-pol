services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: "Political Intelligence Platform"
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-political_intelligence}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      DB_QUEUE: screening
      DB_QUEUE_RETRY_AFTER: 7200
      FASTAPI_BASE_URL: http://ai-service:8000
      FASTAPI_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      FASTAPI_TIMEOUT: ${FASTAPI_TIMEOUT:-300}
      SESSION_ENCRYPT: "true"
    depends_on:
      - postgres
      - redis
      - ai-service

  ai-service:
    build:
      context: ./ai-service
    environment:
      APP_ENV: ${APP_ENV:-local}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-political_intelligence}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Do NOT expose ports in production. Uncomment for local dev only:
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # Do NOT expose ports in production. Uncomment for local dev only:
    # ports:
    #   - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
