services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: "Political Intelligence Platform"
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: political_intelligence
      DB_USERNAME: political_user
      DB_PASSWORD: political_password
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      DB_QUEUE: screening
      DB_QUEUE_RETRY_AFTER: 7200
      FASTAPI_BASE_URL: http://ai-service:8000
      FASTAPI_INTERNAL_TOKEN: local-dev-token
      FASTAPI_TIMEOUT: 7200
    depends_on:
      - postgres
      - redis
      - ai-service

  ai-service:
    build:
      context: ./ai-service
    environment:
      APP_ENV: local
      INTERNAL_SERVICE_TOKEN: local-dev-token

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: political_intelligence
      POSTGRES_USER: political_user
      POSTGRES_PASSWORD: political_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
